name: Gitee Go Build Test

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test-dependencies:
    name: Test Dependencies on Linux
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          build-essential \
          libxcb-xinerama0 \
          libxcb-cursor0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxkbcommon-x11-0 \
          libegl1 \
          tesseract-ocr \
          tesseract-ocr-eng \
          tesseract-ocr-chi-sim

    - name: 安装 Python 依赖
      run: |
        python --version
        python -m pip --version
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller
        python -m pip list

    - name: 测试模块导入
      run: |
        python -c "import sys; print('Python:', sys.version)"
        python -c "import PySide6; print('✓ PySide6:', PySide6.__version__)"
        python -c "import PIL; print('✓ Pillow:', PIL.__version__)"
        python -c "import pytesseract; print('✓ pytesseract OK')"
        python -c "from src import __version__; print('✓ App version:', __version__)"

    - name: 测试 Tesseract
      run: |
        tesseract --version
        tesseract --list-langs

    - name: 构建测试成功
      run: |
        echo "================================"
        echo "✓ Gitee Go 环境测试通过"
        echo "✓ 所有依赖安装成功"
        echo "================================"
        echo ""
        echo "注意: Gitee Go 免费版仅支持 Linux runner"
        echo "Windows/macOS 构建请使用 GitHub Actions"
        echo ""
        echo "GitHub Actions 配置: .github/workflows/build-macos.yml"
