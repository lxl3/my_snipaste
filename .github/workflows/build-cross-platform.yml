name: Build Cross-Platform Apps

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 标签时触发
  workflow_dispatch:  # 允许手动触发
    inputs:
      version:
        description: '版本号（如 1.0.0）'
        required: false
        default: 'dev'

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows app
      run: python scripts/build_windows.py --no-spec
      env:
        PYTHONIOENCODING: utf-8

    - name: Create archive
      run: |
        cd dist
        Compress-Archive -Path openSnipaste.exe -DestinationPath openSnipaste-Windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openSnipaste-Windows
        path: dist/openSnipaste-Windows.zip
        retention-days: 30

  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        brew install tesseract
        brew install tesseract-lang

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build macOS app
      run: python scripts/build_macos.py

    - name: Create DMG
      id: create_dmg
      continue-on-error: true
      run: |
        brew install create-dmg
        create-dmg \
          --volname "openSnipaste" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "openSnipaste.app" 175 120 \
          --hide-extension "openSnipaste.app" \
          --app-drop-link 425 120 \
          "dist/openSnipaste-macOS.dmg" \
          "dist/openSnipaste.app"

    - name: Create ZIP fallback
      if: always()
      run: |
        cd dist
        zip -r openSnipaste-macOS.zip openSnipaste.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openSnipaste-macOS
        path: |
          dist/openSnipaste-macOS.dmg
          dist/openSnipaste-macOS.zip
        retention-days: 30

  create-release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/openSnipaste-Windows/*.zip
          artifacts/openSnipaste-macOS/*.dmg
          artifacts/openSnipaste-macOS/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
